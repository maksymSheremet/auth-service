spring:
  # JPA Development
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true

  # Flyway Development
  flyway:
    baseline-on-migrate: true

# Logging Development
logging:
  level:
    my.code.auth: DEBUG
    org.hibernate.SQL: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG
    org.springframework.kafka: DEBUG

# Actuator Development
management:
  endpoints:
    web:
      exposure:
        include: "*"  # Всі endpoints в dev
  endpoint:
    health:
      show-details: always

# JWT Development (довший expiration)
jwt:
  expiration: 86400000  # 24 години в dev