spring:
  # JPA Test
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # H2 Test Database
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # Flyway Test (disabled for H2)
  flyway:
    enabled: false

  # Kafka Test (embedded)
  kafka:
    bootstrap-servers: ${spring.embedded.kafka.brokers}

# JWT Test
jwt:
  secret: test-secret-key-minimum-32-chars-12345678
  expiration: 3600000
  refresh-expiration: 604800000

# Logging Test
logging:
  level:
    my.code.auth: DEBUG
    org.springframework.test: INFO