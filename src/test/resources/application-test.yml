spring:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
  flyway:
    enabled: false
jwt:
  secret: ${JWT_SECRET:your-very-secure-secret-key-for-testing-1234567890abcdef} # ≥32 байти
  expiration: 3600000 # 1 година
  refresh-expiration: 604800000 # 7 днів